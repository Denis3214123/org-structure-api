services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: structapi
      POSTGRES_PASSWORD: structapi
      POSTGRES_DB: structapi
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U structapi -d structapi"]
      interval: 3s
      timeout: 5s
      retries: 15

  api:
    build: .
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+psycopg2://structapi:structapi@db:5432/structapi
      LOG_LEVEL: INFO
    depends_on:
      db:
        condition: service_healthy
